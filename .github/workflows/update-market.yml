name: Update Market Data

on:
  schedule:
    # 北京时间 11:40, 15:10, 21:40
    - cron: '40 3 * * 1-5'   # UTC 03:40 = 北京 11:40
    - cron: '10 7 * * 1-5'   # UTC 07:10 = 北京 15:10
    - cron: '40 13 * * 1-5'  # UTC 13:40 = 北京 21:40
  workflow_dispatch:
  repository_dispatch:
    types: [update-data]

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          sparse-checkout: |
            api/data.json
            scripts/fetch_data.py
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch market data
        run: python scripts/fetch_data.py
        continue-on-error: true

      - name: Commit and push
        run: |
          if [ -f api/data.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add api/data.json
            git diff --cached --quiet || git commit -m "📊 自动更新市场数据 $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "::notice::数据已更新并推送"
          else
            echo "::warning::数据文件未生成，跳过提交"
          fi
