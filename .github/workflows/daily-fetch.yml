name: 每日收盘数据抓取

on:
  schedule:
    - cron: '10 7 * * 1-5'   # UTC 7:10 = 北京 15:10，周一~周五
  workflow_dispatch:
  repository_dispatch:
    types: [fetch-data]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install akshare pandas requests

      - name: 抓取数据
        run: python fetch_data.py
        continue-on-error: true

      - name: 提交数据文件
        run: python scripts/github_push.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
