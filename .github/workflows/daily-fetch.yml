name: Daily Market Data Fetch

on:
  schedule:
    - cron: '10 7 * * 1-5'   # UTC 7:10 = 北京 15:10，周一~周五
  workflow_dispatch:
  repository_dispatch:
    types: [fetch-data]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false   # 不继承 token

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch data
        run: python fetch_data.py

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://xiaoliu-bot:${{ secrets.GH_PAT }}@github.com/xiaoliu-bot/market-monitor.git

      - name: Commit and push
        run: |
          git add api/data.json api/history/
          git diff --staged --quiet && echo "No changes" || {
            DATE=$(date '+%Y-%m-%d')
            git commit -m "📊 收盘数据 $DATE"
            git push
          }
