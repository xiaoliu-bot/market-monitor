name: 每日收盘数据抓取

on:
  # 每个交易日北京时间 15:10 自动抓取
  schedule:
    - cron: '10 7 * * 1-5'   # UTC 7:10 = 北京 15:10，周一~周五
  workflow_dispatch:
  repository_dispatch:
    types: [fetch-data]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 抓取数据
        run: python fetch_data.py

      - name: 提交数据文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/data.json api/history/
          git diff --staged --quiet && echo "No changes" || {
            DATE=$(date '+%Y-%m-%d')
            git commit -m "📊 收盘数据 $DATE"
            git push
          }
