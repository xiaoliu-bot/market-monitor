name: 每日收盘数据抓取

on:
  # 每个交易日北京时间 15:05 自动抓取
  schedule:
    - cron: '5 7 * * 1-5'   # UTC 7:05 = 北京 15:05，周一~周五
  # 也支持手动触发
  workflow_dispatch:
  # 支持 API 触发（curl -X POST ...）
  repository_dispatch:
    types: [fetch-data]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests -q

      - name: 抓取数据
        run: python fetch_data.py
        env:
          TZ: Asia/Shanghai

      - name: 提交 data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/data.json
          git diff --staged --quiet && echo "No changes" || {
            git commit -m "📊 收盘数据 $(date '+%Y-%m-%d %H:%M')"
            git push
          }
